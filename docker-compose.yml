services:
  mongodb:
    image: mongo:7
    container_name: axis-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - axis_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  axis-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axis-web
    restart: always
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Ensure you pass your production DATABASE_URL here if it connects to the mongodb container
      - DATABASE_URL=mongodb://axis-mongodb:27017/axis?replicaSet=rs0
    depends_on:
      - mongodb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.axis-web.rule=Host(`axisoperations.ca`) || Host(`www.axisoperations.ca`) || Host(`187.124.154.106`)"
      - "traefik.http.services.axis-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=easy-northstar-guide-57003_default"
    networks:
      - default
      - easy_northstar
      - supabase

volumes:
  axis_mongo_data:

networks:
  easy_northstar:
    name: easy-northstar-guide-57003_default
    external: true
  supabase:
    name: supabase_default
    external: true

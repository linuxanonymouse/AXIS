services:
  mongodb:
    image: mongo:7
    container_name: axis-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - axis_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  axis-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axis-web
    restart: always
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Ensure you pass your production DATABASE_URL here if it connects to the mongodb container
      - DATABASE_URL=mongodb://axis-mongodb:27017/axis?replicaSet=rs0
    depends_on:
      - mongodb
    networks:
      - default

volumes:
  axis_mongo_data:


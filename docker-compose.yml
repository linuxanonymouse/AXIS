services:
  mongodb:
    image: mongo:7
    container_name: axis-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - axis_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  axis_mongo_data:
